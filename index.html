<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Store | متجر الكمبيوتر العصري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: white; }
        
        /* تأثير حركي عند ظهور البطاقات */
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-10px); border-color: #3b82f6; box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.1); }
        
        /* شكل زر السلة المتحرك */
        .cart-badge { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen">

    <header class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-gradient-to-l from-blue-400 to-cyan-300 bg-clip-text text-transparent">Computer Store</h1>
            
            <button class="cart-badge relative bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-full font-bold flex items-center gap-2 transition">
                <span>سلة المشتريات</span>
                <span id="cartCount" class="bg-white text-blue-600 rounded-full px-2 text-sm">0</span>
            </button>
        </div>
    </header>

    <section class="container mx-auto py-16 px-4 text-center">
        <h2 class="text-4xl md:text-5xl font-bold mb-4">أهلاً بك في متجرنا العصري</h2>
        <p class="text-slate-400 text-lg max-w-2xl mx-auto">أفضل قطع الكمبيوتر والاكسسوارات بأسعار منافسة وجودة مضمونة.</p>
    </section>

    <main class="container mx-auto px-4 pb-20">
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-20 text-slate-500 italic">جاري تحميل أحدث القطع...</div>
        </div>
    </main>

    <footer class="bg-slate-900 border-t border-slate-800 py-10 text-center">
        <p class="text-slate-500">© 2026 جميع الحقوق محفوظة لمتجرك الذكي</p>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc_PLFbR1U2P7ADA2NKH_CC7Nhop0C7qg",
            authDomain: "computer-store-12162.firebaseapp.com",
            projectId: "computer-store-12162",
            storageBucket: "computer-store-12162.firebasestorage.app",
            messagingSenderId: "1047562593688",
            appId: "1:1047562593688:web:d4af1e57e5b25c59e2f7ed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // جلب المنتجات وعرضها بشكل حي (Real-time)
        const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = ""; // مسح رسالة التحميل

            snapshot.forEach((doc) => {
                const item = doc.data();
                const stockStatus = item.stock > 0 
                    ? `<span class="text-green-400 text-xs font-bold">متوفر: ${item.stock} قطع</span>`
                    : `<span class="text-red-500 text-xs font-bold">نفدت الكمية</span>`;

                grid.innerHTML += `
                    <div class="product-card bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden flex flex-col h-full group">
                        <div class="relative overflow-hidden aspect-video">
                            <img src="${item.image}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="${item.name}">
                            <div class="absolute top-3 left-3 bg-blue-600/90 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold shadow-lg">
                                ${item.category}
                            </div>
                        </div>

                        <div class="p-6 flex flex-col flex-grow">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-lg font-bold text-white group-hover:text-blue-400 transition">${item.name}</h3>
                                ${stockStatus}
                            </div>
                            
                            <div class="mt-auto pt-4 flex items-center justify-between">
                                <span class="text-2xl font-bold text-blue-400 font-mono">$${item.price}</span>
                                <button 
                                    onclick="addToCart('${item.name}', ${item.price})" 
                                    class="${item.stock > 0 ? 'bg-slate-800 hover:bg-blue-600' : 'bg-slate-800 opacity-50 cursor-not-allowed'} px-4 py-2 rounded-xl transition font-bold text-sm"
                                    ${item.stock > 0 ? '' : 'disabled'}
                                >
                                    ${item.stock > 0 ? 'إضافة للسلة' : 'غير متوفر'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        });

        // وظيفة السلة (بسيطة للعرض)
        let count = 0;
        window.addToCart = (name, price) => {
            count++;
            document.getElementById('cartCount').innerText = count;
            alert(`تمت إضافة ${name} للسلة بقيمة $${price}`);
        };
    </script>
</body>
</html>
