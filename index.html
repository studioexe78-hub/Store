<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر إكسسوارات الكمبيوتر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: white; scroll-behavior: smooth; }
        .cart-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <nav class="p-5 bg-slate-900 border-b border-slate-800 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-blue-400">Computer <span class="text-white">Store</span></h1>
        <button onclick="toggleCart()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm transition flex items-center gap-2">
            🛒 السلة (<span id="cartCount">0</span>)
        </button>
    </nav>

    <header class="py-12 px-5 text-center bg-gradient-to-b from-slate-900 to-slate-850">
        <h2 class="text-3xl font-bold mb-2">طوّر جهازك اليوم</h2>
        <p class="text-slate-400 text-sm">شحن سريع ودفع آمن عبر شام كاش</p>
    </header>

    <main id="productsContainer" class="max-w-6xl mx-auto p-5 grid grid-cols-1 md:grid-cols-3 gap-6">
        <p class="text-center col-span-full text-slate-500 italic">جاري جلب أحدث الإكسسوارات...</p>
    </main>

    <div id="cartModal" class="cart-modal p-4">
        <div class="bg-slate-900 w-full max-w-md rounded-2xl p-6 border border-slate-700 shadow-2xl relative">
            <button onclick="toggleCart()" class="absolute top-4 left-4 text-slate-500 hover:text-white text-xl">✕</button>
            <h2 class="text-xl font-bold mb-4 border-b border-slate-800 pb-2 text-blue-400">محتويات السلة</h2>
            
            <div id="cartItems" class="space-y-3 max-h-60 overflow-y-auto mb-4 custom-scrollbar">
                </div>

            <div class="border-t border-slate-800 pt-4">
                <div class="flex justify-between font-bold text-lg mb-4">
                    <span>الإجمالي:</span>
                    <span id="cartTotal" class="text-green-400">0</span> <span class="text-xs text-green-400">ل.س</span>
                </div>
                
                <label class="block text-sm text-slate-400 mb-2">طريقة الدفع:</label>
                <select id="paymentMethod" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 mb-4 outline-none">
                    <option value="دفع عند الاستلام">دفع عند الاستلام</option>
                    <option value="شام كاش">تطبيق شام كاش</option>
                </select>

                <button onclick="sendOrder()" class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-xl font-bold transition flex items-center justify-center gap-2">
                    ✅ تأكيد الطلب عبر واتساب
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBc_PLFbR1U2P7ADA2NKH_CC7Nhop0C7qg",
          authDomain: "computer-store-12162.firebaseapp.com",
          projectId: "computer-store-12162",
          storageBucket: "computer-store-12162.firebasestorage.app",
          messagingSenderId: "1047562593688",
          appId: "1:1047562593688:web:d4af1e57e5b25c59e2f7ed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let cart = [];
        let ownerPhone = "963997160904"; // ضع هنا رقم واتساب الزبون (المعلم صاحب المحل) يبدأ بـ 963

        async function loadProducts() {
            const container = document.getElementById('productsContainer');
            const querySnapshot = await getDocs(collection(db, "products"));
            container.innerHTML = "";

            querySnapshot.forEach((doc) => {
                const p = doc.data();
                const productHTML = `
                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 hover:border-blue-500 transition group">
                        <div class="h-40 bg-slate-700 rounded-xl mb-3 overflow-hidden">
                            <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-105 transition" onerror="this.src='https://via.placeholder.com/200?text=PC+Part'">
                        </div>
                        <h3 class="font-bold text-white truncate">${p.name}</h3>
                        <p class="text-blue-400 font-bold mb-3">${p.price} ل.س</p>
                        <button onclick="addToCart('${p.name}', ${p.price})" class="w-full bg-slate-700 group-hover:bg-blue-600 py-2 rounded-lg text-sm transition">إضافة للسلة</button>
                    </div>
                `;
                container.innerHTML += productHTML;
            });
        }

        window.addToCart = (name, price) => {
            cart.push({name, price});
            updateCartUI();
        };

        window.updateCartUI = () => {
            const itemsContainer = document.getElementById('cartItems');
            const count = document.getElementById('cartCount');
            const total = document.getElementById('cartTotal');
            
            itemsContainer.innerHTML = "";
            let totalPrice = 0;
            
            cart.forEach((item, index) => {
                totalPrice += parseInt(item.price);
                itemsContainer.innerHTML += `
                    <div class="flex justify-between items-center text-sm bg-slate-800 p-2 rounded-lg">
                        <span>${item.name}</span>
                        <div class="flex items-center gap-3">
                            <span class="text-blue-400 font-bold">${item.price}</span>
                            <button onclick="removeFromCart(${index})" class="text-red-500 font-bold">✕</button>
                        </div>
                    </div>
                `;
            });
            
            count.innerText = cart.length;
            total.innerText = totalPrice.toLocaleString();
        };

        window.removeFromCart = (index) => {
            cart.splice(index, 1);
            updateCartUI();
        };

        window.toggleCart = () => {
            const modal = document.getElementById('cartModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        };

        window.sendOrder = () => {
            if(cart.length === 0) return alert("السلة فارغة!");
            
            let message = "مرحباً، أود طلب المنتجات التالية:\n\n";
            cart.forEach(item => {
                message += `• ${item.name} - ${item.price} ل.س\n`;
            });
            
            const total = document.getElementById('cartTotal').innerText;
            const payMethod = document.getElementById('paymentMethod').value;
            
            message += `\n💰 الإجمالي: ${total} ل.س`;
            message += `\n💳 طريقة الدفع: ${payMethod}`;
            
            const encodedMsg = encodeURIComponent(message);
            window.open(`https://wa.me/${ownerPhone}?text=${encodedMsg}`, '_blank');
        };

        loadProducts();
    </script>
</body>
</html>
