<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم المؤمنة - إدارة المتجر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: white; }
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body class="p-5 flex justify-center items-center min-h-screen">

    <div id="loginBox" class="w-full max-w-md bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">تسجيل دخول الإدارة</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-xs text-slate-500 mb-1">البريد الإلكتروني</label>
                <input type="email" id="userEmail" placeholder="admin@example.com" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none focus:border-blue-500 transition text-left" dir="ltr">
            </div>
            <div>
                <label class="block text-xs text-slate-500 mb-1">كلمة المرور</label>
                <input type="password" id="userPass" placeholder="••••••••" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none focus:border-blue-500 transition text-left" dir="ltr">
            </div>
            <button onclick="checkLogin()" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition">دخول آمن</button>
        </div>
    </div>

    <div id="adminPanel" class="hidden w-full max-w-xl bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl">
        <div class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <h1 class="text-xl font-bold text-blue-400">إضافة منتج جديد</h1>
            <button onclick="logout()" class="bg-red-900/30 text-red-400 px-3 py-1 rounded-lg text-xs hover:bg-red-900/50 transition">تسجيل خروج</button>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-xs text-slate-500 mb-1">اسم المنتج</label>
                <input type="text" id="pName" placeholder="مثلاً: سماعة محيطية RGB" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none focus:border-blue-500">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-slate-500 mb-1">السعر (ل.س)</label>
                    <input type="number" id="pPrice" placeholder="250000" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">القسم</label>
                    <input type="text" id="pCategory" placeholder="سماعات" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none focus:border-blue-500">
                </div>
            </div>

            <div class="bg-slate-800 p-6 rounded-xl border-2 border-dashed border-slate-700 text-center hover:border-blue-500 transition relative">
                <input type="file" id="pFile" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                <div id="fileStatus">
                    <p class="text-3xl mb-2">📸</p>
                    <p class="text-sm text-slate-400">اضغط لاختيار صورة المنتج</p>
                </div>
            </div>

            <button onclick="uploadAndSave()" id="saveBtn" class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-xl font-bold transition flex items-center justify-center gap-2">
                <span>حفظ المنتج في المتجر</span>
            </button>
            
            <p id="msg" class="text-center text-green-400 hidden font-bold mt-2 animate-bounce">✅ تم الحفظ بنجاح!</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyBc_PLFbR1U2P7ADA2NKH_CC7Nhop0C7qg",
            authDomain: "computer-store-12162.firebaseapp.com",
            projectId: "computer-store-12162",
            storageBucket: "computer-store-12162.firebasestorage.app",
            messagingSenderId: "1047562593688",
            appId: "1:1047562593688:web:d4af1e57e5b25c59e2f7ed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const imgbbAPIKey = "d4153c26566671cd622f560fa7986321";

        // 1. مراقب حالة الدخول
        onAuthStateChanged(auth, (user) => {
            const loginBox = document.getElementById('loginBox');
            const adminPanel = document.getElementById('adminPanel');
            if (user) {
                loginBox.classList.add('hidden');
                adminPanel.classList.remove('hidden');
            } else {
                loginBox.classList.remove('hidden');
                adminPanel.classList.add('hidden');
            }
        });

        // 2. وظيفة تسجيل الدخول
        window.checkLogin = async () => {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            const btn = document.getElementById('loginBtn');

            if(!email || !pass) return alert("يرجى إدخال البيانات");

            btn.innerText = "جاري التحقق...";
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                alert("خطأ: " + error.message);
                btn.innerText = "دخول آمن";
                btn.disabled = false;
            }
        };

        // 3. وظيفة تسجيل الخروج
        window.logout = () => signOut(auth);

        // 4. تحديث شكل رفع الملف
        document.getElementById('pFile').onchange = function() {
            if(this.files[0]) document.getElementById('fileStatus').innerHTML = "✅ جاهز: " + this.files[0].name;
        };

        // 5. رفع الصورة وحفظ المنتج
        window.uploadAndSave = async () => {
            const fileInput = document.getElementById('pFile');
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const category = document.getElementById('pCategory').value;

            if(!fileInput.files[0] || !name || !price) return alert("يرجى ملء الحقول واختيار صورة");

            const btn = document.getElementById('saveBtn');
            btn.innerHTML = `<div class="loader w-5 h-5 border-2 rounded-full border-white/30 border-t-white mr-2"></div> جاري الرفع...`;
            btn.disabled = true;

            try {
                // رفع الصورة لـ ImgBB
                let formData = new FormData();
                formData.append("image", fileInput.files[0]);

                const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbAPIKey}`, {
                    method: "POST",
                    body: formData
                });
                const imgData = await imgRes.json();
                const imageUrl = imgData.data.url;

                // حفظ البيانات في Firestore
                await addDoc(collection(db, "products"), {
                    name,
                    price,
                    category,
                    image: imageUrl,
                    createdAt: new Date()
                });

                document.getElementById('msg').classList.remove('hidden');
                setTimeout(() => location.reload(), 2000);

            } catch (error) {
                alert("فشل الحفظ: " + error.message);
                btn.innerText = "حفظ المنتج في المتجر";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
