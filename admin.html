<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية - إدارة المخزون</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: white; }
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="p-5 flex justify-center items-center min-h-screen">

    <div id="loginBox" class="w-full max-w-md bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">دخول الإدارة</h2>
        <div class="space-y-4">
            <input type="email" id="userEmail" placeholder="البريد الإلكتروني" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none focus:border-blue-500 text-left" dir="ltr">
            <input type="password" id="userPass" placeholder="كلمة المرور" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none focus:border-blue-500 text-left" dir="ltr">
            <button onclick="checkLogin()" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition">دخول</button>
        </div>
    </div>

    <div id="adminPanel" class="hidden w-full max-w-2xl bg-slate-900 p-6 md:p-8 rounded-2xl border border-slate-800 shadow-2xl my-10">
        <div class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <h1 id="panelTitle" class="text-xl font-bold text-blue-400">إضافة منتج جديد</h1>
            <button onclick="logout()" class="text-red-400 text-sm hover:underline">تسجيل خروج</button>
        </div>

        <div class="space-y-4 bg-slate-800/50 p-6 rounded-xl border border-slate-700 mb-10">
            <input type="hidden" id="editId"> <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="pName" placeholder="اسم المنتج" class="bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none focus:border-blue-500">
                <input type="number" id="pPrice" placeholder="السعر بالدولار $" class="bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none focus:border-blue-500 text-left" dir="ltr">
                <input type="number" id="pStock" placeholder="الكمية المتوفرة" class="bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none focus:border-blue-500 text-left" dir="ltr">
                <input type="text" id="pCategory" placeholder="القسم" class="bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none focus:border-blue-500">
                <div class="relative bg-slate-700 p-3 rounded-lg text-center border-2 border-dashed border-slate-500 hover:border-blue-400 transition col-span-full">
                    <input type="file" id="pFile" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                    <span id="fileStatus" class="text-xs text-slate-300">📸 اختر صورة (اختياري عند التعديل)</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="uploadAndSave()" id="saveBtn" class="flex-1 bg-green-600 hover:bg-green-700 py-3 rounded-xl font-bold transition mt-2">حفظ ونشر</button>
                <button onclick="resetForm()" id="cancelBtn" class="hidden bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-xl font-bold transition mt-2">إلغاء</button>
            </div>
        </div>

        <div class="mt-8">
            <h2 class="text-lg font-bold mb-4 text-blue-300">📦 إدارة المخزون الحالي</h2>
            <div id="adminProductsList" class="space-y-3 max-h-96 overflow-y-auto pr-2 custom-scrollbar">
                <p class="text-slate-500 italic text-center py-4 text-sm">جاري التحميل...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc_PLFbR1U2P7ADA2NKH_CC7Nhop0C7qg",
            authDomain: "computer-store-12162.firebaseapp.com",
            projectId: "computer-store-12162",
            storageBucket: "computer-store-12162.firebasestorage.app",
            messagingSenderId: "1047562593688",
            appId: "1:1047562593688:web:d4af1e57e5b25c59e2f7ed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const imgbbAPIKey = "d4153c26566671cd622f560fa7986321";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadAdminProducts();
            } else {
                document.getElementById('loginBox').classList.remove('hidden');
                document.getElementById('adminPanel').classList.add('hidden');
            }
        });

        window.checkLogin = async () => {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("بيانات خاطئة"); }
        };

        window.logout = () => signOut(auth);

        // جلب المنتجات
        async function loadAdminProducts() {
            const listContainer = document.getElementById('adminProductsList');
            const querySnapshot = await getDocs(collection(db, "products"));
            listContainer.innerHTML = "";
            
            querySnapshot.forEach((docRef) => {
                const p = docRef.data();
                const id = docRef.id;
                listContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-800 p-3 rounded-lg border border-slate-700">
                        <div class="flex items-center gap-3">
                            <img src="${p.image}" class="w-12 h-12 rounded object-cover border border-slate-600">
                            <div>
                                <p class="font-bold text-sm text-white">${p.name}</p>
                                <p class="text-xs text-blue-400 font-mono">$${p.price} | الكمية: ${p.stock || 0}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editProduct('${id}', \`${p.name}\`, ${p.price}, ${p.stock || 0}, '${p.category}')" class="text-blue-400 p-2 hover:bg-blue-400/10 rounded">تعديل ✏️</button>
                            <button onclick="deleteProduct('${id}')" class="text-red-500 p-2 hover:bg-red-500/10 rounded">حذف 🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        // وضع التعديل
        window.editProduct = (id, name, price, stock, category) => {
            document.getElementById('editId').value = id;
            document.getElementById('pName').value = name;
            document.getElementById('pPrice').value = price;
            document.getElementById('pStock').value = stock;
            document.getElementById('pCategory').value = category;
            
            document.getElementById('panelTitle').innerText = "تعديل المنتج الحالي";
            document.getElementById('saveBtn').innerText = "تحديث البيانات";
            document.getElementById('cancelBtn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.resetForm = () => {
            document.getElementById('editId').value = "";
            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
            document.getElementById('pStock').value = "";
            document.getElementById('pCategory').value = "";
            document.getElementById('pFile').value = "";
            document.getElementById('fileStatus').innerText = "📸 اختر صورة من الجهاز";
            document.getElementById('panelTitle').innerText = "إضافة منتج جديد";
            document.getElementById('saveBtn').innerText = "حفظ ونشر";
            document.getElementById('cancelBtn').classList.add('hidden');
        };

        window.uploadAndSave = async () => {
            const id = document.getElementById('editId').value;
            const fileInput = document.getElementById('pFile');
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const stock = document.getElementById('pStock').value;
            const category = document.getElementById('pCategory').value;

            if(!name || !price || !stock) return alert("يرجى ملء الحقول الأساسية");

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerText = "جاري الحفظ...";

            try {
                let imageUrl = null;
                // إذا تم اختيار صورة جديدة، ارفعها
                if(fileInput.files[0]) {
                    let formData = new FormData();
                    formData.append("image", fileInput.files[0]);
                    const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbAPIKey}`, { method: "POST", body: formData });
                    const imgData = await imgRes.json();
                    imageUrl = imgData.data.url;
                }

                const productData = { name, price: Number(price), stock: Number(stock), category, updatedAt: new Date() };
                if(imageUrl) productData.image = imageUrl;

                if(id) {
                    await updateDoc(doc(db, "products", id), productData);
                    alert("تم التحديث!");
                } else {
                    if(!imageUrl) throw new Error("يجب اختيار صورة للمنتج الجديد");
                    productData.createdAt = new Date();
                    await addDoc(collection(db, "products"), productData);
                    alert("تمت الإضافة!");
                }
                resetForm();
                loadAdminProducts();
            } catch (e) {
                alert("خطأ: " + e.message);
                btn.disabled = false;
            }
        };

        window.deleteProduct = async (id) => {
            if(confirm("حذف؟")) {
                await deleteDoc(doc(db, "products", id));
                loadAdminProducts();
            }
        };

        document.getElementById('pFile').onchange = function() {
            if(this.files[0]) document.getElementById('fileStatus').innerText = "✅ " + this.files[0].name;
        };
    </script>
</body>
</html>
